name: CI

on:
  push:

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    environment: staging
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials for China region audience
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.IAM_ROLE }}

      - name: Deploy Terraform Infra
        working-directory: root-module/
        run: |
          terraform init
          terraform plan -var-file=${{ vars.ENVIRONMENT_STAGE }}.tfvars
          terraform destroy -auto-approve -input=false -var-file=${{ vars.ENVIRONMENT_STAGE }}.tfvars


